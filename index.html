<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collab Draw</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#eee;font-family:-apple-system,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#topbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:#16213e;border-bottom:1px solid #333;flex-wrap:wrap;flex-shrink:0}
#topbar .logo{font-weight:700;font-size:16px;color:#e94560;margin-right:8px}
#topbar .status{font-size:12px;padding:3px 10px;border-radius:4px}
#topbar .status.live{background:#1a3a1a;color:#4ade80}
#topbar .status.offline{background:#3a1a1a;color:#f87171}
#topbar .room-input{background:#0f3460;border:1px solid #333;color:#eee;padding:4px 8px;border-radius:4px;font-size:12px;width:140px;outline:none}
#topbar .room-input:focus{border-color:#e94560}
#topbar button{background:#e94560;border:none;color:#fff;padding:5px 14px;border-radius:4px;cursor:pointer;font-size:12px}
#topbar button:hover{background:#d63850}
#topbar .peer-count{font-size:11px;color:#888}
#topbar .spacer{flex:1}
#topbar label{font-size:11px;color:#aaa}
#topbar input[type=range]{width:60px}
#topbar input[type=color]{width:24px;height:24px;border:none;cursor:pointer;padding:0;border-radius:2px}
#topbar .sep{width:1px;height:22px;background:#333}
#canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:#0a0a1a;position:relative;overflow:hidden}
canvas{background:#fff;box-shadow:0 0 30px rgba(0,0,0,.5);cursor:crosshair;touch-action:none}
#users{position:absolute;top:10px;right:10px;font-size:11px;color:#888;background:rgba(0,0,0,.6);padding:6px 10px;border-radius:6px;display:none}
#users.show{display:block}
#users .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
#chat{position:absolute;bottom:10px;right:10px;width:200px;background:rgba(0,0,0,.8);border-radius:8px;overflow:hidden;font-size:12px}
#chat-header{padding:6px 10px;background:rgba(0,0,0,.4);color:#aaa;cursor:pointer;display:flex;justify-content:space-between}
#chat-body{display:none;flex-direction:column;max-height:150px}
#chat-body.open{display:flex}
#chat-msgs{flex:1;overflow-y:auto;padding:6px 10px;max-height:100px;min-height:30px}
#chat-msgs .msg{color:#ccc;margin-bottom:2px;word-break:break-word}
#chat-msgs .msg .u{color:#e94560;font-weight:600}
#chat-input{display:flex;border-top:1px solid #333}
#chat-input input{flex:1;background:transparent;border:none;color:#eee;padding:6px 10px;font-size:12px;outline:none}
#chat-input button{background:#e94560;border:none;color:#fff;padding:4px 10px;cursor:pointer;font-size:11px}
</style>
</head>
<body>

<div id="topbar">
  <span class="logo">🎨 Collab Draw</span>
  <div class="status offline" id="statusBadge">offline</div>
  <input class="room-input" id="roomInput" placeholder="Room..." spellcheck="false" value="mayo">
  <button onclick="joinRoom()">Join</button>
  <span class="peer-count" id="peerCount"></span>
  <span class="spacer"></span>
  
  <button id="toolBrush" class="active" onclick="setTool('brush')" title="Brush">🖌</button>
  <button id="toolEraser" onclick="setTool('eraser')" title="Eraser">◻</button>
  <button id="toolClear" onclick="clearCanvas()" title="Clear">🗑</button>
  <span class="sep"></span>
  <label>Size</label>
  <input type="range" id="brushSize" min="1" max="100" value="4">
  <label id="sizeLabel">4px</label>
  <label>Color</label>
  <input type="color" id="brushColor" value="#e94560">
</div>

<div id="canvas-wrap">
  <canvas id="mainCanvas" width="900" height="600"></canvas>
  <div id="users" class="show">
    <span class="dot" style="background:#e94560"></span> You
    <span id="otherUsers"></span>
  </div>
  <div id="chat">
    <div id="chat-header" onclick="toggleChat()">
      <span>💬 Chat</span>
      <span id="chatToggle">▴</span>
    </div>
    <div id="chat-body" class="open">
      <div id="chat-msgs"></div>
      <div id="chat-input">
        <input id="chatInput" placeholder="Message..." onkeydown="if(event.key==='Enter')sendChat()">
        <button onclick="sendChat()">Send</button>
      </div>
    </div>
  </div>
</div>

<script>
// === CONFIG ===
const RELAY = "wss://jump-learners-efforts-midwest.trycloudflare.com";

// === STATE ===
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
let ws = null;
let roomId = 'mayo';
let userId = Math.random().toString(36).slice(2,6);
let isDrawing = false;
let lastX = 0, lastY = 0;
let tool = 'brush';
let brushSize = 4;
let brushColor = '#e94560';
let reconnectTimer = null;
let peers = {};

// === WHITE BG ===
ctx.fillStyle = '#fff';
ctx.fillRect(0,0,canvas.width,canvas.height);

// === WEBSOCKET ===
function connect() {
  if (ws) try{ws.close()}catch(e){}
  if (!roomId) return;
  document.getElementById('statusBadge').textContent = 'connecting…';
  document.getElementById('statusBadge').className = 'status offline';
  
  ws = new WebSocket(RELAY);
  ws.onopen = () => {
    ws.send(JSON.stringify({type:'join', room:roomId}));
    document.getElementById('statusBadge').textContent = 'live';
    document.getElementById('statusBadge').className = 'status live';
    reconnectTimer = null;
  };
  
  ws.onmessage = (e) => {
    try { var msg = JSON.parse(e.data); } catch { return; }
    switch(msg.type) {
      case 'init':
        document.getElementById('peerCount').textContent = '🟢 live';
        break;
      case 'peers':
        document.getElementById('peerCount').textContent = msg.count > 0 ? '('+msg.count+' here)' : '';
        updatePeers(msg.count);
        break;
      case 'draw':
        applyDraw(msg.data);
        break;
      case 'clear':
        if (msg.sender !== userId) clearLocal();
        break;
      case 'chat':
        if (msg.data && msg.data.sender !== userId) addChat(msg.data.sender, msg.data.text);
        break;
    }
  };
  
  ws.onclose = () => {
    document.getElementById('statusBadge').textContent = 'reconnecting…';
    document.getElementById('statusBadge').className = 'status offline';
    if (!reconnectTimer) reconnectTimer = setTimeout(connect, 2000);
  };
  ws.onerror = () => {};
}

function send(type, data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({type, room:roomId, data, sender:userId}));
  }
}

// === DRAWING ===
canvas.addEventListener('mousedown', (e) => {
  isDrawing = true;
  const r = canvas.getBoundingClientRect();
  lastX = (e.clientX - r.left) * (canvas.width / r.width);
  lastY = (e.clientY - r.top) * (canvas.height / r.height);
  
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.lineWidth = brushSize;
  ctx.strokeStyle = brushColor;
  ctx.beginPath();
  ctx.arc(lastX, lastY, brushSize/2, 0, Math.PI*2);
  ctx.fill();
  
  send('draw', {type:'dot', x:lastX, y:lastY, size:brushSize, color:brushColor});
});

canvas.addEventListener('mousemove', (e) => {
  if (!isDrawing) return;
  const r = canvas.getBoundingClientRect();
  const x = (e.clientX - r.left) * (canvas.width / r.width);
  const y = (e.clientY - r.top) * (canvas.height / r.height);
  
  ctx.lineWidth = brushSize;
  ctx.strokeStyle = brushColor;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(x, y);
  ctx.stroke();
  
  send('draw', {type:'line', x, y, size:brushSize, color:brushColor});
  lastX = x; lastY = y;
});

canvas.addEventListener('mouseup', () => { isDrawing = false; send('draw', {type:'end'}); });
canvas.addEventListener('mouseleave', () => { isDrawing = false; });

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  const r = canvas.getBoundingClientRect();
  lastX = (t.clientX - r.left) * (canvas.width / r.width);
  lastY = (t.clientY - r.top) * (canvas.height / r.height);
  isDrawing = true;
  ctx.lineWidth = brushSize;
  ctx.strokeStyle = brushColor;
  ctx.beginPath();
  ctx.arc(lastX, lastY, brushSize/2, 0, Math.PI*2);
  ctx.fill();
  send('draw', {type:'dot', x:lastX, y:lastY, size:brushSize, color:brushColor});
}, {passive:false});

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!isDrawing) return;
  const t = e.touches[0];
  const r = canvas.getBoundingClientRect();
  const x = (t.clientX - r.left) * (canvas.width / r.width);
  const y = (t.clientY - r.top) * (canvas.height / r.height);
  ctx.lineWidth = brushSize;
  ctx.strokeStyle = brushColor;
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(x, y);
  ctx.stroke();
  send('draw', {type:'line', x, y, size:brushSize, color:brushColor});
  lastX = x; lastY = y;
}, {passive:false});

canvas.addEventListener('touchend', () => { isDrawing = false; send('draw', {type:'end'}); });

// === RECEIVE DRAW EVENTS ===
function applyDraw(data) {
  if (!data) return;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  
  if (data.type === 'dot') {
    ctx.lineWidth = data.size;
    ctx.strokeStyle = data.color;
    ctx.fillStyle = data.color;
    ctx.beginPath();
    ctx.arc(data.x, data.y, data.size/2, 0, Math.PI*2);
    ctx.fill();
  } else if (data.type === 'line' && data.sx != null) {
    ctx.lineWidth = data.size;
    ctx.strokeStyle = data.color;
    ctx.beginPath();
    ctx.moveTo(data.sx, data.sy);
    ctx.lineTo(data.x, data.y);
    ctx.stroke();
  } else if (data.type === 'line') {
    // We handle this by keeping a 'last' per user - see below
  }
}

// For remote lines we need a per-user last position
const remoteLast = {};
canvas.addEventListener('draw-event', (e) => {
  const d = e.detail;
  if (d.type === 'dot') {
    ctx.fillStyle = d.color;
    ctx.lineWidth = d.size;
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.size/2, 0, Math.PI*2);
    ctx.fill();
    remoteLast[d.user] = {x:d.x, y:d.y};
  } else if (d.type === 'line') {
    const last = remoteLast[d.user];
    if (last) {
      ctx.lineWidth = d.size;
      ctx.strokeStyle = d.color;
      ctx.beginPath();
      ctx.moveTo(last.x, last.y);
      ctx.lineTo(d.x, d.y);
      ctx.stroke();
    }
    remoteLast[d.user] = {x:d.x, y:d.y};
  } else if (d.type === 'end') {
    delete remoteLast[d.user];
  }
});

// Override the message handler to use the custom event
const origHandler = ws ? ws.onmessage : null;

// === TOOLS ===
function setTool(t) {
  tool = t;
  document.getElementById('toolBrush').className = t==='brush'?'active':'';
  document.getElementById('toolEraser').className = t==='eraser'?'active':'';
  canvas.style.cursor = 'crosshair';
}

function clearCanvas() {
  if (confirm('Clear the canvas for everyone?')) {
    clearLocal();
    send('clear', {});
  }
}

function clearLocal() {
  ctx.fillStyle = '#fff';
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

// === PEERS ===
function updatePeers(count) {
  const o = document.getElementById('otherUsers');
  o.textContent = count > 1 ? '· ' + (count-1) + ' other' + (count>2?'s':'') : '';
}

// === CHAT ===
function addChat(sender, text) {
  const el = document.getElementById('chat-msgs');
  const d = document.createElement('div');
  d.className = 'msg';
  d.innerHTML = '<span class="u">'+esc(sender)+'</span> '+esc(text);
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function sendChat() {
  const inp = document.getElementById('chatInput');
  const text = inp.value.trim();
  if (!text) return;
  send('chat', {sender:userId, text});
  addChat('you', text);
  inp.value = '';
}

function toggleChat() {
  document.getElementById('chat-body').classList.toggle('open');
  document.getElementById('chatToggle').textContent = 
    document.getElementById('chat-body').classList.contains('open') ? '▴' : '▾';
}

function esc(s) { return s.replace(/[<>&]/g,function(c){return{'<':'&lt;','>':'&gt;','&':'&amp;'}[c]}); }

// === ROOM ===
function joinRoom() {
  const r = document.getElementById('roomInput').value.trim();
  if (!r) return;
  roomId = r;
  connect();
}

// === UI ===
document.getElementById('brushSize').addEventListener('input', (e) => {
  brushSize = parseInt(e.target.value);
  document.getElementById('sizeLabel').textContent = brushSize+'px';
});
document.getElementById('brushColor').addEventListener('input', (e) => {
  brushColor = e.target.value;
});

// === OVERRIDE WS ONMESSAGE FOR CUSTOM EVENT ===
// We need to intercept draw messages properly
// Re-setup after connection
let connectOrig = connect;
connect = function() {
  if (ws) try{ws.close()}catch(e){}
  if (!roomId) return;
  document.getElementById('statusBadge').textContent = 'connecting…';
  document.getElementById('statusBadge').className = 'status offline';
  
  ws = new WebSocket(RELAY);
  ws.onopen = () => {
    ws.send(JSON.stringify({type:'join', room:roomId}));
    document.getElementById('statusBadge').textContent = 'live';
    document.getElementById('statusBadge').className = 'status live';
  };
  
  ws.onmessage = (e) => {
    try { var msg = JSON.parse(e.data); } catch { return; }
    switch(msg.type) {
      case 'init':
        document.getElementById('peerCount').textContent = '🟢 live';
        break;
      case 'peers':
        document.getElementById('peerCount').textContent = msg.count > 0 ? '('+msg.count+' here)' : '';
        updatePeers(msg.count);
        break;
      case 'draw':
        if (msg.sender === userId) break;
        canvas.dispatchEvent(new CustomEvent('draw-event', {detail:{...msg.data, user:msg.sender}}));
        break;
      case 'clear':
        if (msg.sender !== userId) clearLocal();
        break;
      case 'chat':
        if (msg.data && msg.data.sender !== userId) addChat(msg.data.sender, msg.data.text);
        break;
    }
  };
  
  ws.onclose = () => {
    document.getElementById('statusBadge').textContent = 'reconnecting…';
    document.getElementById('statusBadge').className = 'status offline';
    if (!reconnectTimer) reconnectTimer = setTimeout(connect, 2000);
  };
  ws.onerror = () => {};
};

// Auto-join on load
joinRoom();
</script>
</body>
</html>
