<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Code Collab</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1e1e1e;color:#eee;font-family:-apple-system,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#topbar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:#252526;border-bottom:1px solid #333;flex-shrink:0}
#topbar .logo{font-weight:700;font-size:14px;color:#e94560}
#topbar .status{font-size:11px;padding:2px 8px;border-radius:3px}
#topbar .status.live{background:#1a3a1a;color:#4ade80}
#topbar .status.offline{background:#3a1a1a;color:#f87171}
#topbar input.room{background:#1e1e1e;border:1px solid #444;color:#eee;padding:3px 6px;border-radius:3px;font-size:11px;width:100px}
#topbar button{background:#e94560;border:none;color:#fff;padding:3px 10px;border-radius:3px;cursor:pointer;font-size:11px}
#topbar .spacer{flex:1}
#topbar .peer{font-size:11px;color:#888}
.split{flex:1;display:flex;min-height:0}
.editor-pane{width:45%;display:flex;flex-direction:column;border-right:1px solid #333}
.editor-pane .hdr{background:#2d2d2d;padding:4px 10px;font-size:11px;color:#888;border-bottom:1px solid #333;flex-shrink:0}
textarea{flex:1;background:#1e1e1e;border:none;outline:none;resize:none;color:#d4d4d4;font:13px/1.5 'Cascadia Code','Fira Code',monospace;padding:8px;tab-size:2;white-space:pre;overflow:auto}
.preview-pane{flex:1;display:flex;flex-direction:column}
.preview-pane .hdr{background:#2d2d2d;padding:4px 10px;font-size:11px;color:#888;border-bottom:1px solid #333;flex-shrink:0;display:flex;gap:8px}
.preview-pane .hdr button{background:#0e639c;border:none;color:#fff;padding:2px 8px;border-radius:3px;cursor:pointer;font-size:10px;margin-left:auto}
iframe{flex:1;width:100%;border:none;background:#fff}
#chat{height:28px;background:#252526;border-top:1px solid #333;display:flex;align-items:center;padding:0 10px;flex-shrink:0;gap:6px}
#chat input{flex:1;background:#1e1e1e;border:1px solid #444;color:#eee;padding:3px 8px;border-radius:3px;font-size:11px;outline:none}
#chat button{background:#e94560;border:none;color:#fff;padding:2px 8px;border-radius:3px;cursor:pointer;font-size:10px}
#chat-msgs{font-size:11px;color:#aaa;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex:1}
</style>
</head>
<body>

<div id="topbar">
  <span class="logo">&lt;/&gt; Live Collab</span>
  <div class="status offline" id="status">offline</div>
  <input class="room" id="roomInput" value="mayo" spellcheck="false">
  <button onclick="joinRoom()">Join</button>
  <span class="peer" id="peerCount"></span>
  <span class="spacer"></span>
  <button onclick="resetCode()">↺ Reset</button>
</div>

<div class="split">
  <div class="editor-pane">
    <div class="hdr">✏️ Code</div>
    <textarea id="editor" spellcheck="false"></textarea>
  </div>
  <div class="preview-pane">
    <div class="hdr">
      🔍 Output
      <button onclick="runCode()">▶ Run</button>
    </div>
    <iframe id="preview" sandbox="allow-scripts allow-modals allow-same-origin"></iframe>
  </div>
</div>

<div id="chat">
  <div id="chat-msgs"></div>
  <input id="chatInput" placeholder="Message..." onkeydown="if(event.key==='Enter')sendChat()">
  <button onclick="sendChat()">Send</button>
</div>

<script>
// === CONFIG ===
const RELAY = "wss://african-italic-chuck-solaris.trycloudflare.com";
const DEFAULT_CODE = `<!DOCTYPE html>
<html>
<head><style>
  body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#1a1a2e;color:#eee;flex-direction:column}
  canvas{border:1px solid #333;border-radius:8px;background:#fff}
</style></head>
<body>
  <canvas id="c" width="400" height="400"></canvas>
  <script>
    const c = document.getElementById('c'), ctx = c.getContext('2d');
    let x = 200, y = 200, vx = 3, vy = 2;
    
    function draw() {
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, 400, 400);
      
      x += vx; y += vy;
      if (x > 380 || x < 20) vx = -vx;
      if (y > 380 || y < 20) vy = -vy;
      
      ctx.fillStyle = '#e94560';
      ctx.beginPath();
      ctx.arc(x, y, 20, 0, Math.PI*2);
      ctx.fill();
      
      // Sync ball position to peers!
      if (window.__peer) __peer.send({type:'ball', x, y});
      
      requestAnimationFrame(draw);
    }
    draw();
    
    // Receive from peers
    if (window.__peer) {
      __peer.onReceive((data) => {
        if (data.type === 'chat') {
          console.log('Peer says:', data.text);
        }
      });
    }
  <\\/script>
</body>
</html>`;

// === STATE ===
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const statusEl = document.getElementById('status');
const peerCount = document.getElementById('peerCount');

let ws = null;
let roomId = 'mayo';
let userId = Math.random().toString(36).slice(2,6);
let currentCode = DEFAULT_CODE;
let broadcastTimer = null;
let reconnectTimer = null;

// === WEBSOCKET ===
function connect() {
  if (ws) try{ws.close()}catch(e){}
  if (!roomId) return;
  setStatus('connecting…', 'offline');
  
  ws = new WebSocket(RELAY);
  ws.onopen = () => {
    ws.send(JSON.stringify({type:'join', room:roomId}));
    setStatus('live', 'live');
    reconnectTimer = null;
  };
  
  ws.onmessage = (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    
    switch(msg.type) {
      case 'init':
        peerCount.textContent = '🟢 live';
        if (msg.code != null) { editor.value = msg.code; currentCode = msg.code; runCode(); }
        break;
      case 'update':
        if (msg.sender !== userId) {
          editor.value = msg.code;
          currentCode = msg.code;
          runCode();
        }
        break;
      case 'peers':
        peerCount.textContent = msg.count > 0 ? '('+msg.count+' here)' : '';
        break;
      case 'peer':
        // Forward to the iframe
        const iframe = document.getElementById('preview');
        if (iframe && iframe.contentWindow) {
          iframe.contentWindow.postMessage({type:'__peer_in', data: msg.data, sender: msg.sender}, '*');
        }
        break;
      case 'chat':
        if (msg.data && msg.data.sender !== userId) addChat(msg.data.sender, msg.data.text);
        break;
    }
  };
  
  ws.onclose = () => {
    setStatus('reconnecting…', 'offline');
    if (!reconnectTimer) reconnectTimer = setTimeout(connect, 2000);
  };
  ws.onerror = () => {};
}

function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = 'status ' + cls;
}

function send(type, data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({type, room:roomId, data, sender:userId}));
  }
}

// === EDITOR ===
function runCode() {
  currentCode = editor.value;
  const code = injectPeerAPI(currentCode);
  preview.srcdoc = code;
}

function injectPeerAPI(html) {
  const api = `
<script>
(function() {
  // Peer API for syncing events across rooms
  window.__peer = {
    _callbacks: [],
    send: function(data) {
      window.parent.postMessage({type: '__peer_out', data: data}, '*');
    },
    onReceive: function(cb) {
      this._callbacks.push(cb);
    }
  };
  
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === '__peer_in') {
      window.__peer._callbacks.forEach(function(cb) { cb(e.data.data); });
    }
  });
  
  // Also expose as 'peer' for convenience
  window.peer = window.__peer;
})();
<\\/script>
`;
  // Inject before </head> or after <head>
  if (html.includes('</head>')) {
    return html.replace('</head>', api + '</head>');
  }
  return api + html;
}

editor.addEventListener('input', () => {
  clearTimeout(broadcastTimer);
  broadcastTimer = setTimeout(() => {
    send('update', {code: editor.value});
  }, 400);
});

function resetCode() {
  editor.value = DEFAULT_CODE;
  currentCode = DEFAULT_CODE;
  runCode();
  send('update', {code: DEFAULT_CODE});
}

// === LISTEN FOR PEER MESSAGES FROM IFRAME ===
window.addEventListener('message', (e) => {
  if (e.data && e.data.type === '__peer_out') {
    send('peer', e.data.data);
  }
});

// === CHAT ===
function addChat(sender, text) {
  const el = document.getElementById('chat-msgs');
  el.innerHTML = '<b style="color:#e94560">'+esc(sender)+'</b> '+esc(text) + ' · ' + el.innerHTML;
  if (el.innerHTML.length > 300) el.innerHTML = el.innerHTML.slice(0,300)+'…';
}

function sendChat() {
  const inp = document.getElementById('chatInput');
  const text = inp.value.trim();
  if (!text) return;
  send('chat', {sender:userId, text});
  addChat('you', text);
  inp.value = '';
}

function esc(s) { return s.replace(/[<>&]/g,function(c){return{'<':'&lt;','>':'&gt;','&':'&amp;'}[c]}); }

// === ROOM ===
function joinRoom() {
  const r = document.getElementById('roomInput').value.trim();
  if (!r) return;
  roomId = r;
  userId = Math.random().toString(36).slice(2,6);
  editor.value = currentCode;
  runCode();
  connect();
}

// Auto-join
joinRoom();
</script>
</body>
</html>
